name: Proxy-Hunter

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

# [CHANGE] защита от параллельных запусков cron (не отменяет текущий, но ставит в очередь)
concurrency:
  group: proxy-hunter-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ========================================================================== #
  #  [CHANGE] Отдельная job линтера / аудита зависимостей (не блокирует пайплайн)
  # ========================================================================== #
  lint:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff & pip-audit
        run: python -m pip install --upgrade pip ruff pip-audit

      - name: Run ruff (lint)
        run: ruff check src/ --output-format=github || true

      - name: Run pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt || true

  # ========================================================================== #
  #  Основной пайплайн
  # ========================================================================== #
  run-pipeline:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # [CHANGE] shallow clone для ускорения (ранее fetch-depth: 0)
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Convert scripts to LF
        run: |
          for f in install.sh run.sh; do
            if [ -f "$f" ]; then
              sed -i 's/\r$//' "$f"
              chmod +x "$f"
            fi
          done

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          # [CHANGE] проверка всех критичных пакетов из нового requirements.txt
          python -c "import aiohttp, aiofiles, bs4, xxhash, msgpack, tqdm, zstandard, portalocker"

      - name: Create necessary directories
        run: |
          # [CHANGE] bloom_shards теперь в configs/bloom_shards (согласно config.py)
          mkdir -p configs configs/bloom_shards logs assets

      # [CHANGE] корректный mutable-кеш БД: уникальный ключ на запуск + restore по префиксу
      - name: Cache SQLite database
        uses: actions/cache@v4
        with:
          path: configs/history.db
          key: ${{ runner.os }}-history-db-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-history-db-

      # [CHANGE] НОВЫЙ кеш Bloom-шардов для персистентной дедупликации между запусками
      - name: Cache Bloom shards
        uses: actions/cache@v4
        with:
          path: configs/bloom_shards
          key: ${{ runner.os }}-bloom-shards-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-bloom-shards-

      - name: Ensure required files exist
        run: |
          touch configs/output_archive.txt
          touch configs/output_simple.txt
          echo '{}' > configs/parsed_cache.json
          [ -f custom_channels.txt ] || touch custom_channels.txt

      - name: Rotate archive if older than 7 days
        run: |
          ARCHIVE="configs/output_archive.txt"
          if [ -f "$ARCHIVE" ]; then
            AGE=$(($(date +%s) - $(stat -c %Y "$ARCHIVE")))
            MAX_AGE=$((7 * 24 * 3600))
            if [ $AGE -ge $MAX_AGE ]; then
              echo "Archive is older than 7 days ($(($AGE/86400)) days), removing."
              rm -f "$ARCHIVE"
            else
              echo "Archive is $(($AGE/3600)) hours old, keeping."
            fi
          else
            echo "Archive does not exist, will be created."
          fi

      # [CHANGE] Xray-core устанавливается напрямую (install.sh не требует флага --install-xray-only)
      - name: Install Xray-core (optional)
        continue-on-error: true
        run: |
          set +e
          LATEST=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep -oP '"tag_name": "\K[^"]+')
          if [ -z "$LATEST" ]; then LATEST="v24.10.16"; fi
          echo "Installing Xray-core ${LATEST}"
          curl -sSL "https://github.com/XTLS/Xray-core/releases/download/${LATEST}/Xray-linux-64.zip" -o xray.zip
          unzip -o xray.zip -d xray-bin
          chmod +x xray-bin/xray
          echo "$(pwd)/xray-bin" >> "$GITHUB_PATH"
          ./xray-bin/xray version

      - name: Run optimized pipeline
        id: pipeline
        continue-on-error: true
        run: |
          time python src/pipeline_optimized.py

      # [CHANGE] логика вынесена из inline-скрипта в src/maintenance.py
      - name: Remove inactive channels from custom_channels.txt
        run: |
          python src/maintenance.py remove-inactive

      - name: Check output files
        id: check_output
        run: |
          echo "Checking output files..."
          if [ -f "configs/output_archive.txt" ] && [ -s "configs/output_archive.txt" ]; then
            echo "archive_exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ output_archive.txt exists! Size: $(wc -c < configs/output_archive.txt) bytes"
          else
            echo "archive_exists=false" >> "$GITHUB_OUTPUT"
            echo "❌ output_archive.txt not found or empty!"
          fi
          if [ -f "configs/output_simple.txt" ] && [ -s "configs/output_simple.txt" ]; then
            echo "simple_exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ output_simple.txt exists! Size: $(wc -c < configs/output_simple.txt) bytes"
          else
            echo "simple_exists=false" >> "$GITHUB_OUTPUT"
            echo "❌ output_simple.txt not found or empty!"
          fi
          if [ -f "configs/history.db" ]; then
            echo "history_db_exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ history.db exists (size: $(stat -c%s configs/history.db) bytes)"
          else
            echo "history_db_exists=false" >> "$GITHUB_OUTPUT"
          fi

      # [CHANGE] сводка вынесена в src/maintenance.py (читает таблицу runs)
      - name: Show quality summary
        if: steps.check_output.outputs.history_db_exists == 'true'
        run: |
          echo "📊 Quality Summary (from SQLite):"
          python src/maintenance.py summary

      - name: Show pipeline step status
        run: |
          echo "Pipeline step outcome: ${{ steps.pipeline.outcome }}"
          if [ "${{ steps.pipeline.outcome }}" != "success" ]; then
            echo "⚠️ Pipeline step did NOT succeed. See 'Run optimized pipeline' step output above"
            echo "   and the 'pipeline-debug-log' artifact for details."
          fi

      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proxy-output
          path: |
            configs/output_archive.txt
            configs/output_simple.txt
            configs/xray_balanced.json
            configs/history.db
            configs/parsed_cache.json
          retention-days: 7
          if-no-files-found: warn

      # [CHANGE] в git коммитятся ТОЛЬКО текстовые результаты (не БД и не кеш).
      # history.db и parsed_cache.json остаются только в артефактах (+ .gitignore).
      - name: Commit output to repo
        if: steps.check_output.outputs.archive_exists == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add configs/output_archive.txt configs/output_simple.txt \
                  configs/xray_balanced.json custom_channels.txt
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "Update proxy configs and metadata $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            # [CHANGE] rebase на случай параллельных коммитов (shallow clone)
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
            echo "✅ Committed updated files to repository"
          fi

      - name: Upload logs (if pipeline failed)
        if: always() && steps.pipeline.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-log
          path: |
            pipeline_debug.log
            pipeline_debug.log.*
            logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Fail job if pipeline failed
        if: steps.pipeline.outcome == 'failure'
        run: |
          echo "❌ 'Run optimized pipeline' step failed. Failing the job after diagnostics were uploaded."
          exit 1

      - name: Cleanup old artifacts (optional)
        if: always()
        run: |
          find . -name "bloom_shards" -type d -path "*/bloom_shards" -prune -exec rm -rf {} \; 2>/dev/null || true
          find logs -name "*.log" -type f -mtime +7 -delete 2>/dev/null || true
