name: Proxy-Hunter

on:
  schedule:
    - cron: '0 */10 * * *'   # каждые 10 часов
  workflow_dispatch:         # ручной запуск

jobs:
  run-pipeline:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmaxminddb-dev build-essential python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Create necessary directories
        run: |
          mkdir -p configs logs assets bloom_shards

      - name: Ensure required files exist with valid content
        run: |
          # Текстовые файлы могут быть пустыми
          touch configs/output.txt
          touch configs/output_simple.txt
          # JSON-файлы должны содержать корректный пустой объект
          echo '{}' > configs/channel_stats.json
          echo '{}' > configs/quality_history.json
          echo '{}' > configs/location_cache.json
          echo '{}' > configs/parsed_cache.json
          echo '{}' > configs/channel_health.json
          # CSV с заголовками
          echo "timestamp,total_final,avg_score,p50_latency,p95_latency,p99_latency,success_rate" > configs/quality_data.csv
          # custom_channels.txt (если отсутствует)
          touch custom_channels.txt

      - name: Verify and fix JSON files (pre-run)
        run: |
          for file in configs/channel_stats.json configs/quality_history.json configs/location_cache.json configs/parsed_cache.json configs/channel_health.json; do
            if [ -f "$file" ]; then
              if ! python -c "import json; json.load(open('$file'))" 2>/dev/null; then
                echo "⚠️ $file is corrupted, recreating..."
                echo '{}' > "$file"
              fi
            fi
          done

      - name: Run optimized pipeline
        id: pipeline
        continue-on-error: true
        run: |
          time python src/pipeline_optimized.py

      - name: Generate HTML report
        run: |
          python src/generate_charts.py

      - name: Verify and restore JSON files after pipeline
        run: |
          for file in configs/channel_stats.json configs/channel_health.json configs/quality_history.json; do
            if [ -f "$file" ]; then
              if ! python -c "import json; json.load(open('$file'))" 2>/dev/null; then
                echo "⚠️ $file is corrupted or empty after pipeline, restoring from backup or recreating..."
                if [ -f "$file.bak" ]; then
                  cp "$file.bak" "$file"
                  echo "Restored $file from backup"
                else
                  echo '{}' > "$file"
                  echo "Recreated $file with empty object"
                fi
              fi
            else
              echo '{}' > "$file"
              echo "Created missing $file"
            fi
          done

      - name: Remove inactive channels from custom_channels.txt
        run: |
          python -c "
          import json
          import re
          from urllib.parse import urlparse

          def normalize_url(url):
              url = url.strip()
              if not url:
                  return ''
              if not url.startswith('http'):
                  url = 'https://t.me/s/' + url.lstrip('/')
              parsed = urlparse(url)
              if parsed.scheme and parsed.netloc:
                  netloc = parsed.netloc.replace('www.', '')
                  path = parsed.path.rstrip('/')
                  return f'{parsed.scheme}://{netloc}{path}'
              return url

          # Загружаем статистику каналов
          try:
              with open('configs/channel_stats.json', 'r') as f:
                  stats = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f'Could not load channel_stats.json: {e}, skipping removal')
              exit(0)

          # Загружаем здоровье каналов
          try:
              with open('configs/channel_health.json', 'r') as f:
                  health = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              health = {}

          inactive_urls = set()
          for ch in stats.get('channels', []):
              url = ch.get('url', '')
              if not url:
                  continue
              if not ch.get('enabled', True):
                  inactive_urls.add(normalize_url(url))
              health_info = health.get('channels', {}).get(url, {})
              if not health_info.get('is_healthy', True):
                  inactive_urls.add(normalize_url(url))

          if not inactive_urls:
              print('No inactive channels found')
              exit(0)

          print(f'Found {len(inactive_urls)} inactive channels')

          try:
              with open('custom_channels.txt', 'r') as f:
                  lines = f.readlines()
          except FileNotFoundError:
              lines = []

          filtered = []
          removed_count = 0
          for line in lines:
              line = line.strip()
              if not line or line.startswith('#'):
                  filtered.append(line)
                  continue
              norm = normalize_url(line)
              if norm in inactive_urls:
                  removed_count += 1
                  print(f'Removing: {line}')
              else:
                  filtered.append(line)

          with open('custom_channels.txt', 'w') as f:
              for line in filtered:
                  f.write(line + '\n' if line else '\n')

          print(f'Removed {removed_count} inactive channels')
          "

      - name: Check output files
        id: check_output
        run: |
          echo "Checking output files..."
          if [ -f "configs/output.txt" ] && [ -s "configs/output.txt" ]; then
            echo "output_exists=true" >> $GITHUB_OUTPUT
            echo "✅ output.txt exists! Size: $(wc -c < configs/output.txt) bytes"
          else
            echo "output_exists=false" >> $GITHUB_OUTPUT
            echo "❌ output.txt not found or empty!"
          fi
          if [ -f "configs/output_simple.txt" ] && [ -s "configs/output_simple.txt" ]; then
            echo "simple_output_exists=true" >> $GITHUB_OUTPUT
            echo "✅ output_simple.txt exists! Size: $(wc -c < configs/output_simple.txt) bytes"
          else
            echo "simple_output_exists=false" >> $GITHUB_OUTPUT
            echo "❌ output_simple.txt not found or empty!"
          fi
          if [ -f "configs/quality_history.json" ]; then
            echo "history_exists=true" >> $GITHUB_OUTPUT
            echo "✅ quality_history.json exists"
          else
            echo "history_exists=false" >> $GITHUB_OUTPUT
          fi
          if [ -f "configs/quality_data.csv" ]; then
            echo "csv_exists=true" >> $GITHUB_OUTPUT
            echo "✅ quality_data.csv exists"
          else
            echo "csv_exists=false" >> $GITHUB_OUTPUT
          fi
          if [ -f "configs/location_cache.json" ]; then
            echo "location_cache_exists=true" >> $GITHUB_OUTPUT
            echo "✅ location_cache.json exists"
          else
            echo "location_cache_exists=false" >> $GITHUB_OUTPUT
          fi
          if [ -f "configs/parsed_cache.json" ]; then
            echo "parsed_cache_exists=true" >> $GITHUB_OUTPUT
            echo "✅ parsed_cache.json exists"
          else
            echo "parsed_cache_exists=false" >> $GITHUB_OUTPUT
          fi
          if [ -f "configs/channel_health.json" ]; then
            echo "health_exists=true" >> $GITHUB_OUTPUT
            echo "✅ channel_health.json exists"
          else
            echo "health_exists=false" >> $GITHUB_OUTPUT
          fi
          if [ -f "assets/performance_report.html" ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
            echo "✅ performance_report.html exists"
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Show extended health summary
        if: steps.check_output.outputs.health_exists == 'true'
        run: |
          echo "📊 Channel Health Summary:"
          python -c "
          import json
          try:
              with open('configs/channel_health.json') as f:
                  data = json.load(f)
              channels = data.get('channels', {})
              total = len(channels)
              healthy = sum(1 for c in channels.values() if c.get('is_healthy', False))
              print(f'  Total channels: {total}')
              print(f'  Healthy: {healthy}')
              print(f'  Unhealthy: {total - healthy}')
              unhealthy_urls = [url for url, info in channels.items() if not info.get('is_healthy', False)]
              if unhealthy_urls:
                  print('  Sample unhealthy channels:')
                  for url in unhealthy_urls[:5]:
                      print(f'    {url}')
          except Exception as e:
              print(f'  ⚠️  Could not read health: {e}')
          "

      - name: Validate output configs
        if: steps.check_output.outputs.output_exists == 'true'
        run: |
          echo "Validating output configs..."
          python -c "
          import re
          VALID_PROTOCOLS = ['vmess://', 'vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'wireguard://', 'tuic://']
          with open('configs/output.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip()]
          if not lines:
              print('❌ output.txt is empty')
              exit(1)
          valid_count = 0
          for line in lines:
              if any(line.startswith(p) for p in VALID_PROTOCOLS):
                  valid_count += 1
          if valid_count == 0:
              print('❌ No valid protocol lines found in output.txt')
              exit(1)
          print(f'✅ {valid_count} valid configs found')
          "

      - name: Show quality summary
        if: steps.check_output.outputs.history_exists == 'true'
        run: |
          echo "📊 Quality Summary:"
          python -c "
          import json
          try:
              with open('configs/quality_history.json') as f:
                  data = json.load(f)
              runs = data.get('runs', [])
              if runs:
                  latest = runs[-1]
                  print(f'  Total runs: {len(runs)}')
                  print(f'  Latest run: {latest.get(\"timestamp\", \"?\")}')
                  print(f'  Final configs: {latest.get(\"total_final\", 0)}')
                  print(f'  Avg score: {latest.get(\"avg_score\", 0):.1f}')
                  print(f'  P50 latency: {latest.get(\"p50_latency\", 0):.0f}ms')
                  print(f'  P95 latency: {latest.get(\"p95_latency\", 0):.0f}ms')
                  print(f'  P99 latency: {latest.get(\"p99_latency\", 0):.0f}ms')
                  protocols = latest.get('protocols', {})
                  if protocols:
                      print('  Protocols:')
                      for p, count in protocols.items():
                          print(f'    {p}: {count}')
              else:
                  print('  No history data yet')
          except Exception as e:
              print(f'  ⚠️  Could not read history: {e}')
          "

      - name: Show pipeline step status
        run: |
          echo "Pipeline step outcome: ${{ steps.pipeline.outcome }}"
          if [ "${{ steps.pipeline.outcome }}" != "success" ]; then
            echo "⚠️ Pipeline step did NOT succeed. See 'Run optimized pipeline' step output above"
            echo "   and the 'pipeline-debug-log' artifact for details."
          fi

      # Если пайплайн упал — выводим последние строки лога для быстрой диагностики
      - name: Dismiss last lines of debug log on failure
        if: always() && steps.pipeline.outcome == 'failure'
        run: |
          echo "=== Last 50 lines of pipeline_debug.log (if exists) ==="
          if [ -f "pipeline_debug.log" ]; then
            tail -50 pipeline_debug.log
          else
            echo "pipeline_debug.log not found."
          fi

      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proxy-output
          path: |
            configs/output.txt
            configs/output_simple.txt
            configs/channel_stats.json
            configs/quality_history.json
            configs/quality_data.csv
            configs/location_cache.json
            configs/parsed_cache.json
            configs/channel_health.json
            assets/performance_report.html
          retention-days: 7
          if-no-files-found: warn

      - name: Commit output to repo
        if: steps.check_output.outputs.output_exists == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add configs/output.txt configs/output_simple.txt configs/channel_stats.json configs/quality_history.json configs/quality_data.csv configs/location_cache.json configs/parsed_cache.json configs/channel_health.json assets/performance_report.html custom_channels.txt
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "Update proxy configs and quality history $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            git push
            echo "✅ Committed updated files to repository"
          fi

      - name: Upload logs (if pipeline failed)
        if: always() && steps.pipeline.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-log
          path: |
            pipeline_debug.log
            pipeline_debug.log.*
            logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Fail job if pipeline failed
        if: steps.pipeline.outcome == 'failure'
        run: |
          echo "❌ 'Run optimized pipeline' step failed. Failing the job after diagnostics were uploaded."
          exit 1

      - name: Cleanup old artifacts (optional)
        if: always()
        run: |
          find . -name "bloom_shards" -type d -exec rm -rf {} \; 2>/dev/null || true
          find logs -name "*.log" -type f -mtime +7 -delete 2>/dev/null || true
