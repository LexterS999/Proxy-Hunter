name: Proxy-Hunter

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  # === Параметры, которые можно переопределить через GitHub Secrets ===
  PROXY_USE_MAXIMUM_POWER: ${{ secrets.PROXY_USE_MAXIMUM_POWER || 'true' }}
  PROXY_SPECIFIC_CONFIG_COUNT: ${{ secrets.PROXY_SPECIFIC_CONFIG_COUNT || '5000' }}
  PROXY_ARCHIVE_MAX_AGE_DAYS: ${{ secrets.PROXY_ARCHIVE_MAX_AGE_DAYS || '14' }}
  PROXY_SIMPLE_MAX_AGE_DAYS: ${{ secrets.PROXY_SIMPLE_MAX_AGE_DAYS || '3' }}
  PROXY_CHECK_TCP_TIMEOUT: ${{ secrets.PROXY_CHECK_TCP_TIMEOUT || '10.0' }}
  PROXY_CHECK_HTTP_TIMEOUT: ${{ secrets.PROXY_CHECK_HTTP_TIMEOUT || '10.0' }}
  PROXY_MAX_LATENCY_MS: ${{ secrets.PROXY_MAX_LATENCY_MS || '10000.0' }}
  PROXY_ACTIVE_CHECKER_WORKERS: ${{ secrets.PROXY_ACTIVE_CHECKER_WORKERS || '100' }}
  PROXY_PER_HOST_LIMIT: ${{ secrets.PROXY_PER_HOST_LIMIT || '10' }}
  PROXY_SCORE_MIN_THRESHOLD: ${{ secrets.PROXY_SCORE_MIN_THRESHOLD || '30.0' }}
  PROXY_CHANNEL_HEALTH_THRESHOLD: ${{ secrets.PROXY_CHANNEL_HEALTH_THRESHOLD || '20.0' }}
  PROXY_GRACE_PERIOD_RUNS: ${{ secrets.PROXY_GRACE_PERIOD_RUNS || '7' }}
  PROXY_CHANNEL_MIN_CONFIGS: ${{ secrets.PROXY_CHANNEL_MIN_CONFIGS || '5' }}
  PROXY_CHANNEL_HISTORY_DAYS: ${{ secrets.PROXY_CHANNEL_HISTORY_DAYS || '14' }}
  PROXY_ADAPTIVE_THRESHOLD_PERCENTILE: ${{ secrets.PROXY_ADAPTIVE_THRESHOLD_PERCENTILE || '20' }}
  # === Логирование ===
  LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'DEBUG' }}   # можно переопределить на INFO
  # === Конец параметров ===

jobs:
  run-pipeline:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Convert scripts to LF
        run: |
          if [ -f "install.sh" ]; then
            sed -i 's/\r$//' install.sh
            chmod +x install.sh
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          python -c "import aiofiles, xxhash, aiodns, maxminddb"

      - name: Create necessary directories
        run: |
          mkdir -p configs logs assets bloom_shards

      # ===== Кэширование SQLite =====
      - name: Cache SQLite database
        uses: actions/cache@v4
        with:
          path: configs/history.db
          key: ${{ runner.os }}-history-db-${{ hashFiles('configs/history.db') }}
          restore-keys: |
            ${{ runner.os }}-history-db-

      # ===== Кэширование Bloom shards =====
      - name: Cache Bloom shards
        uses: actions/cache@v4
        with:
          path: bloom_shards
          key: ${{ runner.os }}-bloom-shards-${{ hashFiles('bloom_shards/**') }}
          restore-keys: |
            ${{ runner.os }}-bloom-shards-

      # ===== Кэширование GeoLite2 ASN базы =====
      - name: Cache GeoLite2 ASN database
        id: cache-geolite
        uses: actions/cache@v4
        with:
          path: configs/GeoLite2-ASN.mmdb
          key: ${{ runner.os }}-geolite2-asn-${{ hashFiles('configs/GeoLite2-ASN.mmdb') }}
          restore-keys: |
            ${{ runner.os }}-geolite2-asn-

      # ===== Скачивание GeoLite2 (только если нет в кэше) =====
      - name: Download GeoLite2 ASN database (optional)
        if: steps.cache-geolite.outputs.cache-hit != 'true'
        run: |
          touch configs/GeoLite2-ASN.mmdb
          echo "⚠️ GeoLite2 база не установлена. Будет использован встроенный список датацентров."

      # ===== Подготовка файлов =====
      - name: Ensure required files exist
        run: |
          touch configs/output_archive.txt
          touch configs/output_simple.txt
          echo '{}' > configs/parsed_cache.json
          [ -f custom_channels.txt ] || touch custom_channels.txt

      - name: Rotate archive if older than 7 days
        run: |
          ARCHIVE="configs/output_archive.txt"
          if [ -f "$ARCHIVE" ]; then
            AGE=$(($(date +%s) - $(stat -c %Y "$ARCHIVE")))
            MAX_AGE=$((7 * 24 * 3600))
            if [ $AGE -ge $MAX_AGE ]; then
              echo "Archive is older than 7 days ($(($AGE/86400)) days), removing."
              rm -f "$ARCHIVE"
            else
              echo "Archive is $(($AGE/3600)) hours old, keeping."
            fi
          else
            echo "Archive does not exist, will be created."
          fi

      - name: Install Xray-core
        run: |
          bash install.sh --install-xray-only

      # ===== Основной запуск (с полным выводом в реальном времени) =====
      - name: Run optimized pipeline
        id: pipeline
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: 1
          LOG_LEVEL: ${{ env.LOG_LEVEL }}
        run: |
          # Используем stdbuf для отключения буферизации вывода
          stdbuf -oL -eL python -u src/pipeline_optimized.py 2>&1 | tee pipeline_debug.log

      # ===== Вывод полного лога после выполнения =====
      - name: Display full log
        if: always()
        run: |
          echo "========================================"
          echo "📜 FULL PIPELINE LOG (begin)"
          echo "========================================"
          if [ -f "pipeline_debug.log" ]; then
            cat pipeline_debug.log
          else
            echo "⚠️ Log file not found!"
          fi
          echo "========================================"
          echo "📜 FULL PIPELINE LOG (end)"
          echo "========================================"

      # ===== Вакуумирование SQLite (сжатие) =====
      - name: Vacuum SQLite database
        if: always()
        run: |
          python -c "
          import sqlite3
          import os
          DB_PATH = 'configs/history.db'
          if os.path.exists(DB_PATH):
              conn = sqlite3.connect(DB_PATH)
              conn.execute('VACUUM')
              conn.close()
              print('✅ SQLite database vacuumed.')
          else:
              print('ℹ️ history.db not found, skipping vacuum.')
          "

      # ===== Удаление неактивных каналов =====
      - name: Remove inactive channels from custom_channels.txt
        run: |
          python -c "
          import sqlite3
          import os
          import re
          from urllib.parse import urlparse

          DB_PATH = 'configs/history.db'

          def normalize_url(url):
              url = url.strip()
              if not url:
                  return ''
              if not url.startswith('http'):
                  url = 'https://t.me/s/' + url.lstrip('/')
              parsed = urlparse(url)
              if parsed.scheme and parsed.netloc:
                  netloc = parsed.netloc.replace('www.', '')
                  path = parsed.path.rstrip('/')
                  return f'{parsed.scheme}://{netloc}{path}'
              return url

          if not os.path.exists(DB_PATH):
              print('history.db not found, skipping removal (first run)')
              exit(0)

          try:
              conn = sqlite3.connect(DB_PATH)
              cursor = conn.cursor()
              cursor.execute(\"SELECT name FROM sqlite_master WHERE type='table' AND name='channels'\")
              if not cursor.fetchone():
                  print('Table channels not found, skipping removal')
                  conn.close()
                  exit(0)
              cursor.execute('SELECT url FROM channels WHERE enabled = 0')
              rows = cursor.fetchall()
              inactive_urls = {normalize_url(row[0]) for row in rows}
              conn.close()
          except Exception as e:
              print(f'Could not read SQLite: {e}')
              exit(0)

          if not inactive_urls:
              print('No inactive channels found')
              exit(0)

          print(f'Found {len(inactive_urls)} inactive channels')

          try:
              with open('custom_channels.txt', 'r') as f:
                  lines = f.readlines()
          except FileNotFoundError:
              lines = []

          filtered = []
          removed_count = 0
          for line in lines:
              line = line.strip()
              if not line or line.startswith('#'):
                  filtered.append(line)
                  continue
              norm = normalize_url(line)
              if norm in inactive_urls:
                  removed_count += 1
                  print(f'Removing: {line}')
              else:
                  filtered.append(line)

          with open('custom_channels.txt', 'w') as f:
              for line in filtered:
                  f.write(line + '\n' if line else '\n')

          print(f'Removed {removed_count} inactive channels')
          "

      # ===== Проверка выходных файлов =====
      - name: Check output files
        id: check_output
        run: |
          echo "Checking output files..."
          if [ -f "configs/output_archive.txt" ] && [ -s "configs/output_archive.txt" ]; then
            echo "archive_exists=true" >> $GITHUB_OUTPUT
            echo "✅ output_archive.txt exists! Size: $(wc -c < configs/output_archive.txt) bytes"
          else
            echo "archive_exists=false" >> $GITHUB_OUTPUT
            echo "❌ output_archive.txt not found or empty!"
          fi
          if [ -f "configs/output_simple.txt" ] && [ -s "configs/output_simple.txt" ]; then
            echo "simple_exists=true" >> $GITHUB_OUTPUT
            echo "✅ output_simple.txt exists! Size: $(wc -c < configs/output_simple.txt) bytes"
          else
            echo "simple_exists=false" >> $GITHUB_OUTPUT
            echo "❌ output_simple.txt not found or empty!"
          fi
          if [ -f "configs/history.db" ]; then
            echo "history_db_exists=true" >> $GITHUB_OUTPUT
            echo "✅ history.db exists (size: $(stat -c%s configs/history.db) bytes)"
          else
            echo "history_db_exists=false" >> $GITHUB_OUTPUT
          fi
          if [ -f "configs/parsed_cache.json" ]; then
            echo "parsed_cache_exists=true" >> $GITHUB_OUTPUT
            echo "✅ parsed_cache.json exists"
          else
            echo "parsed_cache_exists=false" >> $GITHUB_OUTPUT
          fi
          if [ -f "configs/regional_weights.json" ]; then
            echo "regional_weights_exists=true" >> $GITHUB_OUTPUT
            echo "✅ regional_weights.json exists"
          else
            echo "regional_weights_exists=false" >> $GITHUB_OUTPUT
          fi

      # ===== Краткая статистика =====
      - name: Show quality summary
        if: steps.check_output.outputs.history_db_exists == 'true'
        run: |
          echo "📊 Quality Summary (from SQLite):"
          python -c "
          import sqlite3
          import json
          DB_PATH = 'configs/history.db'
          try:
              conn = sqlite3.connect(DB_PATH)
              cursor = conn.cursor()
              cursor.execute(\"SELECT name FROM sqlite_master WHERE type='table' AND name='runs'\")
              if not cursor.fetchone():
                  print('  No runs table yet (first run)')
                  conn.close()
                  exit(0)
              cursor.execute('SELECT * FROM runs ORDER BY timestamp DESC LIMIT 1')
              row = cursor.fetchone()
              if row:
                  cols = ['id', 'timestamp', 'total_raw', 'total_valid', 'total_final', 'avg_score', 'p50_latency', 'p95_latency', 'p99_latency', 'success_rate', 'protocols', 'geo_distribution', 'anomalies']
                  latest = dict(zip(cols, row))
                  print(f'  Latest run: {latest[\"timestamp\"]}')
                  print(f'  Final configs: {latest[\"total_final\"]}')
                  print(f'  Avg score: {latest[\"avg_score\"]:.1f}')
                  print(f'  P50 latency: {latest[\"p50_latency\"]:.0f}ms')
                  print(f'  P95 latency: {latest[\"p95_latency\"]:.0f}ms')
                  print(f'  P99 latency: {latest[\"p99_latency\"]:.0f}ms')
                  protocols = json.loads(latest['protocols']) if latest['protocols'] else {}
                  if protocols:
                      print('  Protocols:')
                      for p, count in protocols.items():
                          print(f'    {p}: {count}')
                  cursor.execute('SELECT COUNT(*) FROM channels WHERE enabled = 1')
                  active_channels = cursor.fetchone()[0]
                  cursor.execute('SELECT COUNT(*) FROM channels')
                  total_channels = cursor.fetchone()[0]
                  print(f'  Active channels: {active_channels} / {total_channels}')
              else:
                  print('  No history data yet')
              conn.close()
          except Exception as e:
              print(f'  ⚠️ Could not read history: {e}')
          "

      # ===== Статус шага pipeline =====
      - name: Show pipeline step status
        run: |
          echo "Pipeline step outcome: ${{ steps.pipeline.outcome }}"
          if [ "${{ steps.pipeline.outcome }}" != "success" ]; then
            echo "⚠️ Pipeline step did NOT succeed. See 'Run optimized pipeline' step output above"
            echo "   and the 'pipeline-debug-log' artifact for details."
          fi

      # ===== Загрузка артефактов =====
      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proxy-output
          path: |
            configs/output_archive.txt
            configs/output_simple.txt
            configs/history.db
            configs/parsed_cache.json
            configs/name_mapping.json
            configs/regional_weights.json
            bloom_shards/
          retention-days: 7
          if-no-files-found: warn

      # ===== Коммит изменений в репозиторий =====
      - name: Commit output to repo
        if: steps.check_output.outputs.archive_exists == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add configs/output_archive.txt configs/output_simple.txt configs/parsed_cache.json configs/name_mapping.json custom_channels.txt configs/regional_weights.json
          if [ -f "configs/history.db" ]; then
            git add configs/history.db
          fi
          if [ -d "bloom_shards" ]; then
            git add bloom_shards/
          fi
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "Update proxy configs and metadata $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            git push
            echo "✅ Committed updated files to repository"
          fi

      # ===== Логи при ошибке =====
      - name: Upload logs (if pipeline failed)
        if: always() && steps.pipeline.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-log
          path: |
            pipeline_debug.log
            logs/
          retention-days: 7
          if-no-files-found: warn

      # ===== Принудительный провал, если pipeline не удался =====
      - name: Fail job if pipeline failed
        if: steps.pipeline.outcome == 'failure'
        run: |
          echo "❌ 'Run optimized pipeline' step failed. Failing the job after diagnostics were uploaded."
          exit 1

      # ===== Очистка старых логов =====
      - name: Cleanup old artifacts (optional)
        if: always()
        run: |
          find logs -name "*.log" -type f -mtime +7 -delete 2>/dev/null || true
